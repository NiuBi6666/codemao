{% extends "base.html" %}
{% block title %}{{ '编辑用户' if target else '新建用户' }} - 学生 ID 查询{% endblock %}
{% block content %}
<div class="page-heading"><div><h1>{{ '编辑用户' if target else '新建用户' }}</h1><p>设置登录信息和角色</p></div></div>
<section class="form-panel">
  <form method="post" class="stack-form">
    <input type="hidden" name="_csrf_token" value="{{ csrf_token() }}">
    <label>用户名
      <input name="username" value="{{ request.form.get('username', target['username'] if target else '') }}" required maxlength="50" autocomplete="off">
    </label>
    <label>显示名称
      <input name="display_name" value="{{ request.form.get('display_name', target['display_name'] if target else '') }}" required maxlength="50">
    </label>
    <label>{{ '重置密码（留空则不修改）' if target else '初始密码' }}
      <input type="password" name="password" {% if not target %}required{% endif %} minlength="10" autocomplete="new-password">
    </label>
    <fieldset>
      <legend>角色</legend>
      <div class="check-list">
      {% for role in roles %}
        <label class="check-row">
          <input type="checkbox" name="role_ids" value="{{ role['id'] }}" {% if role['id']|string in (selected_roles|default(request.form.getlist('role_ids'))) %}checked{% endif %}>
          <span><strong>{{ role['name'] }}</strong><small>{{ role['permission_names'] or '无权限' }}</small></span>
        </label>
      {% endfor %}
      </div>
    </fieldset>
    <label class="toggle-row">
      <input type="checkbox" name="is_active" value="1" {% if request.method == 'POST' %}{{ 'checked' if request.form.get('is_active') == '1' }}{% elif not target or target['is_active'] %}checked{% endif %}>
      <span>启用账号</span>
    </label>
    <div class="form-actions">
      <a class="button secondary" href="{{ url_for('web.users') }}">取消</a>
      <button class="button primary" type="submit">保存</button>
    </div>
  </form>
</section>
{% endblock %}
